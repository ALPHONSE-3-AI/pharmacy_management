{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-md-7">
        <div class="card border-0 pb-3" style="border-top: 4px solid var(--ph-accent) !important;">
            <div class="card-header border-0 pb-0 pt-4 px-5 bg-transparent">
                <h4 class="mb-1 fw-bold" style="color: var(--ph-primary)">Modify Parameter: #{{ medicine.id }}</h4>
                <p class="text-muted small">Update internal records for {{ medicine.name }}.</p>
            </div>
            <div class="card-body px-5">
                <form method="POST">
                    <div class="mb-4 mt-2">
                        <label class="form-label text-muted fw-bold small text-uppercase">Nomenclature Reference</label>
                        <input type="text" name="name" class="form-control py-2 text-dark" style="background-color: var(--ph-bg); border-color: var(--ph-border); font-weight: 500;" value="{{ medicine.name }}" required autofocus>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-sm-6 mb-3 mb-sm-0">
                            <label class="form-label text-muted fw-bold small text-uppercase">Distribution Price ($)</label>
                            <input type="number" step="0.01" min="0" name="price" class="form-control py-2 text-dark fw-bold" style="background-color: var(--ph-bg); border-color: var(--ph-border);" value="{{ medicine.price }}" required>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label text-muted fw-bold small text-uppercase">Batch Quantity Override</label>
                            <input type="number" name="quantity" min="0" class="form-control py-2 text-dark fw-bold" style="background-color: var(--ph-bg); border-color: var(--ph-border);" value="{{ medicine.quantity }}" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold small text-uppercase">Mandatory Expiry Date</label>
                        <input type="date" name="expiry" class="form-control py-2 text-dark" style="background-color: var(--ph-bg); border-color: var(--ph-border);" value="{{ medicine.expiry }}" required>
                    </div>
                    
                    <div class="mb-5">
                        <label class="form-label text-muted fw-bold small text-uppercase">Supplier / Manufacturing Node</label>
                        <select name="manufacturer_id" class="form-select py-2 text-dark fw-bold" style="background-color: var(--ph-bg); border-color: var(--ph-border);" required>
                            {% for mfg in manufacturers %}
                                <option value="{{ mfg.id }}" {% if mfg.id == medicine.manufacturer_id %}selected{% endif %}>{{ mfg.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex justify-content-between align-items-center pt-3 border-top">
                        <a href="{{ url_for('index') }}" class="btn btn-outline-theme px-4 py-2 rounded-pill">Abort Modification</a>
                        <button type="submit" class="btn btn-theme px-5 py-2 fw-semibold rounded-pill">Save Reference Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
