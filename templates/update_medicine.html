{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-md-7">
        <div class="card border-0 pb-3" style="border-top: 4px solid var(--ph-accent) !important;">
            <div class="card-header border-0 pb-0 pt-4 px-5 bg-transparent">
                <h4 class="mb-1 fw-bold" style="color: var(--ph-primary)">Modify Parameter: #{{ medicine.MedicineID }}</h4>
                <p class="text-muted small">Update internal records for {{ medicine.Name }}.</p>
            </div>
            <div class="card-body px-5">
                <form method="POST">
                    <div class="mb-4 mt-2">
                        <label class="form-label text-muted fw-bold small text-uppercase">Name</label>
                        <input type="text" name="name" class="form-control py-2 text-dark" style="background-color: var(--ph-bg); border-color: var(--ph-border); font-weight: 500;" value="{{ medicine.Name }}" required autofocus>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-sm-6 mb-3 mb-sm-0">
                            <label class="form-label text-muted fw-bold small text-uppercase">Price (₹)</label>
                            <input type="number" step="0.01" min="0" name="price" class="form-control py-2 text-dark fw-bold" style="background-color: var(--ph-bg); border-color: var(--ph-border);" value="{{ medicine.Price }}" required>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label text-muted fw-bold small text-uppercase">Quantity</label>
                            <input type="number" name="quantity" min="0" class="form-control py-2 text-dark fw-bold" style="background-color: var(--ph-bg); border-color: var(--ph-border);" value="{{ medicine.Quantity }}" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold small text-uppercase">ReorderPoint</label>
                        <input type="number" name="reorder_point" min="0" class="form-control py-2 text-dark" style="background-color: var(--ph-bg); border-color: var(--ph-border);" value="{{ medicine.ReorderPoint }}" required>
                    </div>
                    
                    <div class="mb-5">
                        <label class="form-label text-muted fw-bold small text-uppercase">ManufacturerID</label>
                        <select name="manufacturer_id" class="form-select py-2 text-dark fw-bold" style="background-color: var(--ph-bg); border-color: var(--ph-border);" required>
                            {% for mfg in manufacturers %}
                                <option value="{{ mfg.ManufacturerID }}" {% if mfg.ManufacturerID == medicine.ManufacturerID %}selected{% endif %}>{{ mfg.CompanyName }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <hr style="border-color: var(--ph-border); margin: 2rem 0;">
                    <h6 class="fw-bold mb-3" style="color: var(--ph-primary);">Pharmacist Advanced Details <span class="text-secondary fw-normal small">(MongoDB Extension)</span></h6>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold small text-uppercase">Description</label>
                        <textarea name="description" class="form-control py-2 text-dark" rows="2" style="background-color: var(--ph-bg); border-color: var(--ph-border);">{{ details.description if details else '' }}</textarea>
                    </div>

                    <div class="row mb-4">
                        <div class="col-sm-6 mb-3 mb-sm-0">
                            <label class="form-label text-muted fw-bold small text-uppercase">Composition</label>
                            <input type="text" name="composition" class="form-control py-2 text-dark" style="background-color: var(--ph-bg); border-color: var(--ph-border);" value="{{ details.composition if details else '' }}" placeholder="e.g. 500mg Amoxicillin">
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label text-muted fw-bold small text-uppercase">Dosage Instructions</label>
                            <input type="text" name="dosage" class="form-control py-2 text-dark" style="background-color: var(--ph-bg); border-color: var(--ph-border);" value="{{ details.dosage if details else '' }}" placeholder="e.g. Twice daily after meals">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold small text-uppercase">Common Uses <span class="fw-normal small text-lowercase">(Comma separated)</span></label>
                        <textarea name="common_uses" class="form-control py-2 text-dark" rows="1" style="background-color: var(--ph-bg); border-color: var(--ph-border);" placeholder="Fever, Pain...">{{ details.common_uses|join(', ') if details and details.common_uses else '' }}</textarea>
                    </div>

                    <div class="row mb-4">
                        <div class="col-sm-6 mb-3 mb-sm-0">
                            <label class="form-label text-muted fw-bold small text-uppercase">Side Effects <span class="fw-normal small text-lowercase">(Comma separated)</span></label>
                            <textarea name="side_effects" class="form-control py-2 text-dark" rows="2" style="background-color: var(--ph-bg); border-color: var(--ph-border);" placeholder="Nausea, Dizziness...">{{ details.side_effects|join(', ') if details and details.side_effects else '' }}</textarea>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label text-muted fw-bold small text-uppercase">Precautions <span class="fw-normal small text-lowercase">(Comma separated)</span></label>
                            <textarea name="precautions" class="form-control py-2 text-dark" rows="2" style="background-color: var(--ph-bg); border-color: var(--ph-border);" placeholder="Avoid alcohol...">{{ details.precautions|join(', ') if details and details.precautions else '' }}</textarea>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold small text-uppercase">Warnings & Risks <span class="fw-normal small text-lowercase">(Comma separated)</span></label>
                        <textarea name="warnings" class="form-control py-2 text-dark" rows="1" style="background-color: var(--ph-bg); border-color: var(--ph-border);" placeholder="Allergy warnings...">{{ details.warnings|join(', ') if details and details.warnings else '' }}</textarea>
                    </div>

                    <div class="row mb-5">
                        <div class="col-sm-8 mb-3 mb-sm-0">
                            <label class="form-label text-muted fw-bold small text-uppercase">Storage Instructions</label>
                            <input type="text" name="storage_instructions" class="form-control py-2 text-dark" style="background-color: var(--ph-bg); border-color: var(--ph-border);" value="{{ details.storage_instructions if details else '' }}" placeholder="e.g. Below 25°C in dry place">
                        </div>
                        <div class="col-sm-4 d-flex align-items-center mt-sm-4">
                            <div class="form-check form-switch p-0 m-0 d-flex align-items-center">
                                <input class="form-check-input ms-0 me-2" type="checkbox" name="doctor_consultation_required" id="doctorConsultOnUpdate" style="width: 2.3em; height: 1.15em;" {% if details and details.doctor_consultation_required %}checked{% endif %}>
                                <label class="form-check-label text-muted fw-bold small" for="doctorConsultOnUpdate">Consultation Required</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center pt-3 border-top">
                        <a href="{{ url_for('index') }}" class="btn btn-outline-theme px-4 py-2 rounded-pill">Abort Modification</a>
                        <button type="submit" class="btn btn-theme px-5 py-2 fw-semibold rounded-pill shadow-sm">Save Reference Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
