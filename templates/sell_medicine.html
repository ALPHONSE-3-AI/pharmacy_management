{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-md-7">
        <div class="card border-0 pb-3" style="border-top: 4px solid var(--ph-accent) !important;">
            <div class="card-header border-0 pb-0 pt-4 px-5 bg-transparent">
                <h4 class="mb-1 fw-bold" style="color: var(--ph-primary)">Process POS Transaction</h4>
                <p class="text-muted small">Select unit stock for instantaneous distribution output.</p>
            </div>
            <div class="card-body px-5">
                <form method="POST">
                    <div class="mb-4 mt-2">
                        <label class="form-label text-muted fw-bold small text-uppercase">Select Medicine Parameter</label>
                        <select name="medicine_id" class="form-select py-2 fw-semibold" style="background-color: var(--ph-bg); border-color: var(--ph-border); border-radius: 8px;" required>
                            <option value="" selected disabled>--- Choose Output Selection ---</option>
                            {% for item in medicines %}
                                <option value="{{ item.id }}">{{ item.name }} (${{ "%.2f"|format(item.price) }} / ea | Availability: [{{ item.quantity }}])</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-5">
                        <label class="form-label text-muted fw-bold small text-uppercase">Distribution Amount</label>
                        <input type="number" name="quantity" class="form-control py-2 fs-5 text-center fw-bold text-dark" style="background-color: var(--ph-bg); border-color: var(--ph-border); border-radius: 8px; width: 140px;" min="1" value="1" required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center pt-3 border-top">
                        <a href="{{ url_for('index') }}" class="btn btn-outline-theme px-4 py-2 rounded-pill">Cancel Checkout</a>
                        <button type="submit" class="btn btn-action fw-bold px-5 py-2 shadow-sm rounded-pill">Distribute Items</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
