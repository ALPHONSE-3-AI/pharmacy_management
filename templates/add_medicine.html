{% extends 'base.html' %}

{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center mb-4 pb-2">
    <div>
        <h3 class="fw-bold" style="color: var(--ph-primary);">Registry Intake</h3>
        <p class="text-muted mb-0">Record arriving medicine units into the tracking catalog.</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 pb-2">
            <div class="card-body px-4 px-md-5 pt-4">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold small text-uppercase">Name</label>
                        <input type="text" name="name" class="form-control py-2 text-dark" style="background-color: var(--ph-bg); border-color: var(--ph-border); font-size: 1.1rem; font-weight: 500;" placeholder="e.g., Amoxicillin 500mg" required autofocus>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-sm-6 mb-3 mb-sm-0">
                            <label class="form-label text-muted fw-bold small text-uppercase">Price (₹)</label>
                            <input type="number" step="0.01" min="0" name="price" class="form-control py-2 text-dark fw-bold" style="background-color: var(--ph-bg); border-color: var(--ph-border);" placeholder="0.00" required>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label text-muted fw-bold small text-uppercase">Quantity</label>
                            <input type="number" name="quantity" min="0" class="form-control py-2 text-dark fw-bold" style="background-color: var(--ph-bg); border-color: var(--ph-border);" placeholder="100" required>
                        </div>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-sm-6 mb-3 mb-sm-0">
                            <label class="form-label text-muted fw-bold small text-uppercase">ReorderPoint</label>
                            <input type="number" min="0" name="reorder_point" class="form-control py-2 text-dark fw-bold" style="background-color: var(--ph-bg); border-color: var(--ph-border);" value="10" required>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label text-muted fw-bold small text-uppercase">ExpiryDate (Batch)</label>
                            <input type="date" name="expiry_date" id="expiry_date" class="form-control py-2 text-dark" style="background-color: var(--ph-bg); border-color: var(--ph-border);" required>
                            <div id="expiry_error" class="text-danger small mt-1" style="display:none;">&#9888; ExpiryDate must be a future date.</div>
                        </div>
                    </div>
                    
                    <div class="mb-5">
                        <label class="form-label text-muted fw-bold small text-uppercase">ManufacturerID</label>
                        <select name="manufacturer_id" class="form-select py-2 text-dark fw-bold" style="background-color: var(--ph-bg); border-color: var(--ph-border);" required>
                            <option value="" selected disabled>Select Manufacturer</option>
                            {% for mfg in manufacturers %}
                                <option value="{{ mfg.ManufacturerID }}">{{ mfg.CompanyName }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex justify-content-between align-items-center pt-3 border-top">
                        <a href="{{ url_for('index') }}" class="btn btn-outline-theme px-4 py-2 rounded-pill">Abort Intake</a>
                        <button type="submit" class="btn btn-theme px-5 py-2 fw-semibold rounded-pill">Commit to Registry</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Set minimum date to tomorrow so the date picker itself prevents past dates
    const expiryInput = document.getElementById('expiry_date');
    const errMsg = document.getElementById('expiry_error');
    const today = new Date();
    const tomorrow = new Date(today);
    tomorrow.setDate(today.getDate() + 1);
    const minDate = tomorrow.toISOString().split('T')[0];
    expiryInput.setAttribute('min', minDate);

    // Live validation as user picks a date
    expiryInput.addEventListener('change', function () {
        const picked = new Date(this.value);
        const todayMidnight = new Date();
        todayMidnight.setHours(0, 0, 0, 0);
        if (picked <= todayMidnight) {
            errMsg.style.display = 'block';
            this.style.borderColor = '#e74c3c';
        } else {
            errMsg.style.display = 'none';
            this.style.borderColor = '';
        }
    });

    // Block form submit if date is invalid
    document.querySelector('form').addEventListener('submit', function (e) {
        const picked = new Date(expiryInput.value);
        const todayMidnight = new Date();
        todayMidnight.setHours(0, 0, 0, 0);
        if (!expiryInput.value || picked <= todayMidnight) {
            e.preventDefault();
            errMsg.style.display = 'block';
            expiryInput.style.borderColor = '#e74c3c';
            expiryInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    });
</script>
{% endblock %}
